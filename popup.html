<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1c1e21;
      background: #fff;
    }

    .header {
      background: linear-gradient(135deg, #0084ff, #0066cc);
      color: #fff; padding: 14px 16px; text-align: center;
    }
    .header h1 { font-size: 16px; font-weight: 700; }

    .view { display: none; }
    .view.active { display: block; }

    /* 通话列表 */
    .tab-section { padding: 12px 16px; }
    .tab-section-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .tab-section-head span { font-size: 12px; color: #65676b; font-weight: 600; }
    .link-btn {
      background: none; border: none; color: #0084ff;
      font-size: 12px; cursor: pointer; padding: 2px 6px;
    }
    .link-btn:hover { text-decoration: underline; }

    .tab-list { list-style: none; max-height: 200px; overflow-y: auto; }
    .tab-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 8px; border-radius: 6px;
    }
    .tab-item:hover { background: #f0f2f5; }
    .tab-item input { width: 16px; height: 16px; accent-color: #0084ff; }
    .tab-item .name {
      flex: 1; font-size: 13px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .tab-item .badge {
      font-size: 10px; color: #0084ff; background: #e7f3ff;
      padding: 1px 6px; border-radius: 4px;
    }

    .empty {
      text-align: center; padding: 20px 16px; color: #999;
      font-size: 12px; line-height: 1.6;
    }

    .hint {
      padding: 6px 16px 12px; font-size: 11px; color: #999;
      line-height: 1.4;
    }

    /* 大按钮 */
    .big-btn {
      display: block; width: calc(100% - 32px); margin: 0 16px 14px;
      padding: 12px; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      text-align: center;
    }
    .big-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-go { background: #0084ff; color: #fff; }
    .btn-go:hover:not(:disabled) { background: #0073e6; }

    /* 摄像头按钮 */
    .btn-cam-on { background: #27ae60; color: #fff; }
    .btn-cam-on:hover:not(:disabled) { background: #219a52; }
    .btn-cam-off { background: #e74c3c; color: #fff; }
    .btn-cam-off:hover:not(:disabled) { background: #d63031; }

    /* 分隔线 */
    .divider {
      height: 1px; background: #e4e6eb; margin: 4px 16px;
    }

    /* 共享中视图 */
    .sharing-view { text-align: center; padding: 24px 16px 16px; }
    .sharing-icon {
      width: 56px; height: 56px; border-radius: 50%;
      background: #e7f3ff; display: flex; align-items: center;
      justify-content: center; margin: 0 auto 12px;
      font-size: 28px;
      animation: breathe 2s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .sharing-text { font-size: 15px; font-weight: 600; color: #1c1e21; }
    .sharing-sub { font-size: 12px; color: #65676b; margin-top: 4px; }

    .btn-stop { background: #fa3e3e; color: #fff; margin-top: 20px; }
    .btn-stop:hover { background: #e03636; }

    /* 底部摄像头区域 */
    .cam-section { padding: 8px 16px 14px; }
    .cam-section-head { font-size: 12px; color: #65676b; font-weight: 600; margin-bottom: 8px; }
    .cam-btns { display: flex; gap: 8px; }
    .cam-btns .big-btn { flex: 1; margin: 0; font-size: 13px; padding: 10px 8px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>拉线共享助手</h1>
  </div>

  <!-- ===== 未共享 ===== -->
  <div class="view active" id="viewIdle">
    <div class="tab-section">
      <div class="tab-section-head">
        <span>检测到的通话：</span>
        <button class="link-btn" id="btnRefresh">🔄 刷新</button>
      </div>
      <ul class="tab-list" id="tabList"></ul>
      <div class="empty" id="emptyState" style="display:none">
        还没有检测到通话<br>请先打开 Messenger 群组通话
      </div>
    </div>
    <div class="hint" id="hint">
      ✨ 点击下方按钮后，第一个通话会弹窗让你选择要共享的窗口，之后其余通话自动共享同一画面。
    </div>
    <button class="big-btn btn-go" id="btnStart" disabled>▶ 开始共享</button>
  </div>

  <!-- ===== 共享中 ===== -->
  <div class="view" id="viewSharing">
    <div class="sharing-view">
      <div class="sharing-icon">📺</div>
      <div class="sharing-text">正在共享中</div>
      <div class="sharing-sub" id="sharingInfo"></div>
      <button class="big-btn btn-stop" id="btnStop">⏹ 一键停止所有共享</button>
    </div>
  </div>

  <!-- ===== 摄像头控制（始终显示） ===== -->
  <div class="divider"></div>
  <div class="cam-section">
    <div class="cam-section-head">📷 摄像头批量控制</div>
    <div class="cam-btns">
      <button class="big-btn btn-cam-on" id="btnCamOn">全部开启</button>
      <button class="big-btn btn-cam-off" id="btnCamOff">全部关闭</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
