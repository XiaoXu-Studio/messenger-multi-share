name: Release Browser Extension

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare extension package
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/icons
          cp manifest.json background.js content.js inject.js popup.html popup.js README.md LICENSE dist/
          cp icons/*.png dist/icons/
          node -e "JSON.parse(require('fs').readFileSync('dist/manifest.json', 'utf8'))"
          test -f dist/manifest.json

      - name: Package extension
        run: |
          set -euo pipefail
          cd dist
          zip -r ../messenger-multi-share-${{ github.ref_name }}.zip .

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: '*.zip'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.zip'
          generate_release_notes: true
